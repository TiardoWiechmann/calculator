<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Calculator</title>
</head>
<body>
    <div id="container">
        <div id="heading">
            <h1>Calculator</h1>
        </div>
        <div class="cover">
            <div class="display"> 1 + 1 = 2</div>
            <div class="buttons">
                <div class="numbers">
                    <div class="row-num">
                        <button>1</button>
                        <button>2</button>
                        <button>3</button>
                    </div>
                    <div class="row-num">
                        <button>4</button>
                        <button>5</button>
                        <button>6</button>
                    </div>
                    <div class="row-num">
                        <button>7</button>
                        <button>8</button>
                        <button>9</button>
                    </div>
                </div>
                <div class="operators">
                    <div class="math-op">
                        <button>➕</button>
                        <button>➖</button>
                    </div>
                    <div class="math-op">
                        <button>✖️</button>
                        <button>➗</button>
                    </div>
                    <div class="math-op">
                        <button>🟰</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    

    <script src="javascript.js"></script>
</body>
</html>
